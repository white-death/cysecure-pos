version: "3.9"

services:

  # ---------------------------------
  # APP DATABASE (POSTGRES)
  # ---------------------------------
  postgres:
    image: postgres:15
    container_name: pos-postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./pos-volumes/postgres:/var/lib/postgresql/data

  # ---------------------------------
  # KEYCLOAK DATABASE
  # ---------------------------------
  keycloak-db:
    image: postgres:15
    container_name: pos-keycloak-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - ./pos-volumes/keycloak-db:/var/lib/postgresql/data

  # ---------------------------------
  # PGADMIN (DATABASE UI)
  # ---------------------------------
  pgadmin:
    image: dpage/pgadmin4
    container_name: pos-pgadmin
    restart: always
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      - postgres
    volumes:
      - ./pos-volumes/pgadmin:/var/lib/pgadmin

  # ---------------------------------
  # KEYCLOAK (IDENTITY PROVIDER)
  # ---------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    container_name: pos-keycloak
    command: start-dev
    restart: always
    env_file:
      - .env
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://${KEYCLOAK_DB_HOST}:${KEYCLOAK_DB_PORT}/${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USERNAME}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      - keycloak-db

  # ---------------------------------
  # FASTAPI BACKEND
  # ---------------------------------
  backend:
    build:
      context: ./pos-backend
      dockerfile: Dockerfile
    container_name: pos-backend
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - keycloak
    volumes:
      - ./pos-backend:/app
