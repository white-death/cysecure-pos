version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: pos-postgres
    restart: always
    env_file:
      - ./pos-db/postgres.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pos-pgadmin
    restart: always
    env_file:
      - ./pos-db/pgadmin.env
    ports:
      - "5050:80"
    depends_on:
      - postgres

  backend:
    build:
      context: ./pos-backend
      dockerfile: Dockerfile
    container_name: pos-backend
    restart: always
    env_file:
      - ./pos-backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    volumes:
      - ./pos-backend:/app

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    container_name: pos-keycloak
    command: start-dev
    restart: always
    env_file:
      - ./pos-idp/.env
    ports:
      - "8080:8080"

volumes:
  postgres_data:
